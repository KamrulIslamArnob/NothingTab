<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HomeScreen Options</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/styles/tokens.css" />
    <link rel="stylesheet" href="../shared/styles/base.css" />
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="options" role="main">
      <header class="options-header">
        <h1>HomeScreen options</h1>
        <p class="muted">Tune the dashboard and keep your data in Chrome storage.</p>
      </header>

      <section class="options-section" aria-labelledby="sec-identity">
        <h2 id="sec-identity">Identity</h2>
        <label class="field">
          <span>Your name</span>
          <input id="opt-name" type="text" maxlength="60" placeholder="Your name" />
        </label>
      </section>

      <section class="options-section" aria-labelledby="sec-bg">
        <h2 id="sec-bg">Background</h2>
        <label class="field">
          <span>Source</span>
          <select id="opt-bg-kind">
            <option value="default">Default image</option>
            <option value="uploaded">Uploaded image</option>
            <option value="url">Image URL</option>
            <option value="solid">Solid color</option>
            <option value="gradient">CSS gradient</option>
          </select>
        </label>

        <div id="opt-bg-file-group" class="field upload-field">
          <span>Choose image</span>
          <input id="opt-bg-file" type="file" accept="image/*" />
          <div id="opt-bg-file-preview-area" class="preview-area">
            <img id="opt-bg-file-preview" src="" alt="" />
            <button id="opt-bg-file-clear" type="button" class="danger">Clear</button>
          </div>
        </div>

        <label id="opt-bg-value-group" class="field">
          <span>Value</span>
          <input id="opt-bg-value" type="text" placeholder="#050816 / linear-gradient(...) / https://..." />
        </label>
      </section>

      <section class="options-section" aria-labelledby="sec-appearance">
        <h2 id="sec-appearance">Appearance</h2>
        <label class="field">
          <span>Blur: <output id="opt-blur-out">0</output>px</span>
          <input id="opt-blur" type="range" min="0" max="20" step="1" />
        </label>
        <label class="field">
          <span>Overlay: <output id="opt-overlay-out">0</output>%</span>
          <input id="opt-overlay" type="range" min="0" max="80" step="5" />
        </label>
        <label class="field row">
          <span>Overlay tint</span>
          <input id="opt-tint-color" type="color" />
        </label>
        <label class="field">
          <span>Button Roundness: <output id="opt-roundness-out">8</output>px</span>
          <input id="opt-roundness" type="range" min="0" max="24" step="1" />
        </label>
        <label class="field">
          <span>Theme Preset</span>
          <select id="opt-theme-preset">
            <option value="minimal">Minimal (Monochromatic)</option>
            <option value="nord">Nord (Arctic Blue)</option>
            <option value="cyberpunk">Cyberpunk (Neon Orange/Red)</option>
            <option value="sage">Sage (Calm Green)</option>
          </select>
        </label>
        <label class="field row">
          <span>Use 24-hour clock</span>
          <input id="opt-h24" type="checkbox" />
        </label>
        <label class="field row">
          <span>Enable Search Bar</span>
          <input id="opt-search-enabled" type="checkbox" />
        </label>
        <label class="field" id="opt-search-engine-group">
          <span>Search Engine</span>
          <select id="opt-search-engine">
            <option value="google">Google</option>
            <option value="duckduckgo">DuckDuckGo</option>
            <option value="bing">Bing</option>
            <option value="yahoo">Yahoo</option>
          </select>
        </label>
        <label class="field row">
          <span>Enable Weather</span>
          <input id="opt-weather-enabled" type="checkbox" />
        </label>
        <div id="opt-weather-details-group">
          <label class="field">
            <span>Weather Location (City)</span>
            <input id="opt-weather-location" type="text" placeholder="e.g. London" />
          </label>
          <label class="field">
            <span>Temperature Unit</span>
            <select id="opt-weather-unit">
              <option value="c">Celsius (°C)</option>
              <option value="f">Fahrenheit (°F)</option>
            </select>
          </label>
        </div>
      </section>

      <section class="options-section" aria-labelledby="sec-widgets">
        <h2 id="sec-widgets">Widgets</h2>
        <ul id="opt-widgets" class="list"></ul>
      </section>

      <section class="options-section" aria-labelledby="sec-clocks">
        <h2 id="sec-clocks">World Clocks</h2>
        <form id="opt-clock-form" class="row-form" autocomplete="off">
          <input id="opt-clock-label" type="text" placeholder="Label (e.g. BD, London)" maxlength="20" required />
          <input id="opt-clock-tz" type="text" placeholder="Timezone (e.g. Europe/London)" />
          <button type="submit">Add</button>
        </form>
        <p class="field-desc" style="font-size: var(--fs-xs); color: var(--text-muted); margin-top: var(--space-2);">
          Leave Timezone blank for local system time. Examples: "Asia/Tokyo", "America/New_York", "Europe/London".
        </p>
        <ul id="opt-clocks" class="list"></ul>
      </section>

      <section class="options-section" aria-labelledby="sec-cats">
        <h2 id="sec-cats">Categories</h2>
        <form id="opt-cat-form" class="row-form" autocomplete="off">
          <input id="opt-cat-name" type="text" placeholder="New category name" maxlength="60" required />
          <button type="submit">Add</button>
        </form>
        <ul id="opt-cats" class="list"></ul>
      </section>

      <section class="options-section" aria-labelledby="sec-bms">
        <h2 id="sec-bms">Bookmarks</h2>
        <form id="opt-bm-form" class="row-form" autocomplete="off">
          <input id="opt-bm-title" type="text" placeholder="Title" maxlength="120" required />
          <input id="opt-bm-url" type="url" placeholder="https://..." required />
          <select id="opt-bm-cat" required></select>
          <button type="submit">Add</button>
        </form>
        <ul id="opt-bms" class="list"></ul>
      </section>

      <section class="actions-section">
        <button id="opt-save" type="button">Save settings</button>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script type="module" src="./optionsController.js"></script>
  </body>
</html>
